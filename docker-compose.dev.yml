name: ${STACKRAY_DEV_COMPOSE_PROJECT:-stackray-dev}

x-worker-base: &worker-base
  build:
    context: .
    dockerfile: worker/Dockerfile.dev
  profiles:
    - worker
  depends_on:
    postgres:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
  environment: &worker-environment
    NODE_ENV: development
    PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stackray
    BETTER_AUTH_SECRET: stackray-local-dev-secret-change-before-shared-use
    BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    STACKRAY_ENABLE_DEV_ACTOR: "true"
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    AWS_DEFAULT_REGION: us-east-1
    AWS_ENDPOINT_URL: http://minio:9000
    AWS_S3_BUCKET_NAME: stackray-dev
    AWS_S3_FORCE_PATH_STYLE: "true"
    NUCLEI_TEMPLATES_DIR: /opt/nuclei-templates
  volumes:
    - .:/app
    - stackray-worker-node-modules:/app/node_modules
    - stackray-worker-pnpm-store:/pnpm/store
  command: pnpm worker

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stackray
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "127.0.0.1:${STACKRAY_DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - stackray-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stackray"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:${STACKRAY_DEV_MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${STACKRAY_DEV_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - stackray-minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        mc mb --ignore-existing local/stackray-dev

  worker-init:
    <<: *worker-base
    command: /bin/sh -lc "pnpm install --frozen-lockfile --store-dir /pnpm/store && pnpm db:migrate:startup"

  worker-http:
    <<: *worker-base
    restart: unless-stopped
    depends_on:
      worker-init:
        condition: service_completed_successfully
    environment:
      <<: *worker-environment
      STACKRAY_WORKER_ROLE: http

  worker-intel:
    <<: *worker-base
    restart: unless-stopped
    depends_on:
      worker-init:
        condition: service_completed_successfully
    environment:
      <<: *worker-environment
      STACKRAY_WORKER_ROLE: intel

  worker-headless:
    <<: *worker-base
    restart: unless-stopped
    depends_on:
      worker-init:
        condition: service_completed_successfully
    environment:
      <<: *worker-environment
      STACKRAY_WORKER_ROLE: headless

volumes:
  stackray-postgres-data:
  stackray-minio-data:
  stackray-worker-node-modules:
  stackray-worker-pnpm-store:
