version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: chore
      include: scope
    groups:
      node-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /worker
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: chore
      include: scope
