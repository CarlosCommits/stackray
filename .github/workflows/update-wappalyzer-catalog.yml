name: Update Wappalyzer catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-catalog:
    runs-on: [self-hosted, Linux, X64, stackray]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Refresh generated Wappalyzer catalog
        id: refresh
        run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types scripts/update-wappalyzer-catalog.ts

      - name: Detect catalog changes
        id: diff
        run: |
          if git diff --quiet -- lib/server/scans/generated/wappalyzer-catalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build pull request body
        if: steps.diff.outputs.changed == 'true'
        env:
          TECHNOLOGY_COUNT: ${{ steps.refresh.outputs.technology_count }}
          CATEGORY_COUNT: ${{ steps.refresh.outputs.category_count }}
          ADDED_COUNT: ${{ steps.refresh.outputs.added_count }}
          REMOVED_COUNT: ${{ steps.refresh.outputs.removed_count }}
          DESCRIPTION_CHANGED_COUNT: ${{ steps.refresh.outputs.description_changed_count }}
          ADDED_MARKDOWN: ${{ steps.refresh.outputs.added_markdown }}
          REMOVED_MARKDOWN: ${{ steps.refresh.outputs.removed_markdown }}
          DESCRIPTION_CHANGES_MARKDOWN: ${{ steps.refresh.outputs.description_changes_markdown }}
          UNMAPPED_COUNT: ${{ steps.refresh.outputs.unmapped_count }}
          UNMAPPED_MARKDOWN: ${{ steps.refresh.outputs.unmapped_markdown }}
        run: |
          {
            echo 'PR_BODY<<EOF'
            echo '## Summary'
            echo '- Refresh the generated Wappalyzer catalog from projectdiscovery/wappalyzergo.'
            echo "- Technologies generated: ${TECHNOLOGY_COUNT}"
            echo "- Upstream categories seen: ${CATEGORY_COUNT}"
            echo "- Added technologies: ${ADDED_COUNT}"
            echo "- Removed technologies: ${REMOVED_COUNT}"
            echo "- Description changes: ${DESCRIPTION_CHANGED_COUNT}"
            if [ "${ADDED_COUNT}" != "0" ] || [ "${REMOVED_COUNT}" != "0" ] || [ "${DESCRIPTION_CHANGED_COUNT}" != "0" ]; then
              echo ''
              echo '## Catalog technology changes'
              if [ "${ADDED_COUNT}" != "0" ]; then
                echo ''
                echo '### Added'
                printf '%s\n' "${ADDED_MARKDOWN}"
              fi
              if [ "${REMOVED_COUNT}" != "0" ]; then
                echo ''
                echo '### Removed'
                printf '%s\n' "${REMOVED_MARKDOWN}"
              fi
              if [ "${DESCRIPTION_CHANGED_COUNT}" != "0" ]; then
                echo ''
                echo '### Description updates'
                printf '%s\n' "${DESCRIPTION_CHANGES_MARKDOWN}"
              fi
            fi
            if [ "${UNMAPPED_COUNT}" != "0" ]; then
              echo ''
              echo '## Warning: Unmapped upstream categories'
              printf '%s\n' "${UNMAPPED_MARKDOWN}"
              echo ''
              echo 'These categories currently fall back to `other` in Stackray.'
            fi
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Create update pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.STACKRAY_PR_TOKEN }}
          branch: automation/update-wappalyzer-catalog
          delete-branch: true
          commit-message: "chore: refresh Wappalyzer catalog"
          title: "chore: refresh Wappalyzer catalog"
          body: ${{ env.PR_BODY }}
          add-paths: |
            lib/server/scans/generated/wappalyzer-catalog.json
