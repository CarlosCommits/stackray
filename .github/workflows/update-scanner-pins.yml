name: Update scanner pins

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - httpx-dev-updated
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-scanners:
    runs-on: [self-hosted, Linux, X64, stackray]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh scanner pins
        id: refresh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm scanners:update

      - name: Create scanner update pull request
        if: steps.refresh.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.STACKRAY_PR_TOKEN }}
          branch: automation/update-scanner-pins
          delete-branch: true
          commit-message: "fix(scanner): update scanner pins"
          title: "fix(scanner): update scanner pins"
          body: |
            ## Summary
            - Update pinned `httpx`, `nuclei`, `subfinder`, and nuclei-template inputs used by the worker image.
            - Leave Stackray's public app version unchanged until a structured release is cut.

            `${{ steps.refresh.outputs.summary }}`
          add-paths: |
            worker/scanner-pins.json
            worker/Dockerfile
            worker/Dockerfile.dev

      # The trusted scanner-pin auto-merge workflow handles merging after the
      # created PR passes CI. Repository-level auto-merge and branch protection
      # are unavailable for the current private repository plan, so that workflow
      # uses explicit branch, author, file, semantic diff, check, and head-SHA
      # gates before running a direct merge.
