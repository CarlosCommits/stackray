name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stackray
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stackray"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/stackray
      BETTER_AUTH_SECRET: stackray-ci-better-auth-secret
      BETTER_AUTH_URL: http://127.0.0.1:3100
      STACKRAY_ENABLE_DEV_ACTOR: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  scanner-docker:
    name: Scanner Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect scanner-impacting changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-parents=0 "${head}")"
          fi

          changed_files="$(git diff --name-only "${base}" "${head}")"
          printf '%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(worker/|scripts/update-scanner-pins\.ts$|docker-compose\.dev\.yml$|package\.json$|pnpm-lock\.yaml$|lib/server/scans/custom-wappalyzer-fingerprints\.json$|lib/server/scans/custom-technology-metadata\.json$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build worker scanner image
        if: steps.changes.outputs.changed == 'true'
        run: docker build -f worker/Dockerfile .

      - name: Skip worker scanner image build
        if: steps.changes.outputs.changed != 'true'
        run: echo "No scanner-impacting files changed."
