name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      BETTER_AUTH_SECRET: stackray-ci-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Performance contracts
        run: pnpm test:performance-contracts

      - name: Railway template validation
        run: pnpm test:railway-template

      - name: Build
        run: pnpm build

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stackray
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d stackray"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      BETTER_AUTH_SECRET: stackray-ci-better-auth-secret
      BETTER_AUTH_URL: http://127.0.0.1:3100
      STACKRAY_ENABLE_DEV_ACTOR: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check system Chrome
        run: google-chrome --version

      - name: Run Playwright smoke tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/stackray
          STACKRAY_E2E_USE_SYSTEM_CHROME: "true"
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  worker-role-smoke:
    name: Worker role smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stackray
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d stackray"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      BETTER_AUTH_SECRET: stackray-ci-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Smoke test worker roles
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/stackray
        shell: bash
        run: |
          set -euo pipefail

          pnpm db:migrate:startup

          for role in all http intel browser; do
            echo "Checking worker role: ${role}"
            STACKRAY_WORKER_ROLE="${role}" pnpm worker:once
          done

  scan-pipeline-smoke:
    name: Scan pipeline smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stackray
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d stackray"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      BETTER_AUTH_SECRET: stackray-ci-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run scan pipeline smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/stackray
        run: |
          pnpm db:migrate:startup
          pnpm test:scan-pipeline-smoke

  production-runtime-smoke:
    name: Production runtime smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stackray
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d stackray"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      BETTER_AUTH_SECRET: stackray-ci-better-auth-secret
      BETTER_AUTH_URL: http://127.0.0.1:3200
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone app
        run: pnpm build

      - name: Start standalone server and probe public route
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/stackray
          PORT: "3200"
        shell: bash
        run: |
          set -euo pipefail

          pnpm start > /tmp/stackray-standalone.log 2>&1 &
          server_pid="$!"
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT

          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3200/forgot-password > /tmp/stackray-runtime-smoke.html; then
              grep -q "Stackray" /tmp/stackray-runtime-smoke.html
              exit 0
            fi

            if ! kill -0 "${server_pid}" 2>/dev/null; then
              echo "Standalone server exited before becoming ready."
              cat /tmp/stackray-standalone.log
              exit 1
            fi

            sleep 2
          done

          echo "Timed out waiting for standalone server."
          cat /tmp/stackray-standalone.log
          exit 1

  scanner-docker:
    name: Scanner Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect scanner-impacting changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running scanner image smoke for ${{ github.event_name }} on ${{ github.ref }}."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-parents=0 "${head}")"
          fi

          changed_files="$(git diff --name-only "${base}" "${head}")"
          printf '%s\n' "${changed_files}"

          scanner_dockerfiles=(
            worker/Dockerfile
            worker/Dockerfile.dev
          )
          always_impacting_paths=(
            .github/workflows/ci.yml
            docker-compose.dev.yml
            worker/Dockerfile
            worker/Dockerfile.dev
          )

          copy_sources="$(
            awk '
              /^[[:space:]]*COPY[[:space:]]/ {
                line = $0
                sub(/[[:space:]]+#.*/, "", line)
                sub(/^[[:space:]]*COPY[[:space:]]+/, "", line)

                skip = 0
                while (line ~ /^--[^[:space:]]+[[:space:]]*/) {
                  if (line ~ /^--from(=|[[:space:]]|$)/) {
                    skip = 1
                  }
                  sub(/^--[^[:space:]]+[[:space:]]*/, "", line)
                }

                if (skip) {
                  next
                }

                count = 0
                if (line ~ /^\[/) {
                  while (match(line, /"([^"\\]|\\.)*"/)) {
                    tokens[++count] = substr(line, RSTART + 1, RLENGTH - 2)
                    line = substr(line, RSTART + RLENGTH)
                  }
                } else {
                  field_count = split(line, fields, /[[:space:]]+/)

                  for (i = 1; i <= field_count; i++) {
                    field = fields[i]
                    if (field == "") {
                      continue
                    }
                    tokens[++count] = field
                  }
                }

                for (i = 1; i < count; i++) {
                  print tokens[i]
                }
                delete tokens
              }
            ' "${scanner_dockerfiles[@]}" | sed 's#^\./##' | sort -u
          )"

          echo "Scanner Docker COPY sources:"
          printf '%s\n' "${copy_sources}"

          is_scanner_impacting_path() {
            local changed_file="$1"
            local source

            for source in "${always_impacting_paths[@]}"; do
              if [ "${changed_file}" = "${source}" ]; then
                return 0
              fi
            done

            while IFS= read -r source; do
              [ -n "${source}" ] || continue
              source="${source#./}"
              source="${source%/}"

              if [ "${source}" = "." ]; then
                return 0
              fi

              if [[ "${source}" == *"*"* || "${source}" == *"?"* || "${source}" == *"["* ]]; then
                if [[ "${changed_file}" == ${source} ]]; then
                  return 0
                fi
                continue
              fi

              if [ "${changed_file}" = "${source}" ] || [[ "${changed_file}" == "${source}/"* ]]; then
                return 0
              fi
            done <<< "${copy_sources}"

            return 1
          }

          scanner_changed=false
          while IFS= read -r changed_file; do
            [ -n "${changed_file}" ] || continue
            if is_scanner_impacting_path "${changed_file}"; then
              echo "Scanner-impacting path changed: ${changed_file}"
              scanner_changed=true
            fi
          done <<< "${changed_files}"

          if [ "${scanner_changed}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate development compose config
        if: steps.changes.outputs.changed == 'true'
        run: docker compose -f docker-compose.dev.yml --profile worker config > /dev/null

      - name: Build worker scanner image
        if: steps.changes.outputs.changed == 'true'
        run: docker build -f worker/Dockerfile -t stackray-worker-scanner-smoke:${{ github.sha }} .

      - name: Smoke test worker runtime imports
        if: steps.changes.outputs.changed == 'true'
        run: |
          docker run --rm --entrypoint node stackray-worker-scanner-smoke:${{ github.sha }} \
            --disable-warning=MODULE_TYPELESS_PACKAGE_JSON \
            --experimental-strip-types \
            --input-type=module \
            -e '
              const modules = [
                "./worker/tasks.ts",
                "./worker/scan-worker.ts",
                "./worker/schedules.ts",
                "./worker/http-probe-phase.ts",
                "./worker/subfinder-phase.ts",
                "./worker/headless-enrichment.ts",
                "./worker/browser-fallback.ts",
                "./worker/nuclei-phase.ts",
                "./worker/ip-enrichment.ts",
                "./worker/recovery.ts",
              ];

              for (const modulePath of modules) {
                await import(modulePath);
                console.log(`Imported ${modulePath}`);
              }
            '

      - name: Smoke test pinned scanner image
        if: steps.changes.outputs.changed == 'true'
        run: |
          docker run --rm stackray-worker-scanner-smoke:${{ github.sha }} sh -euxc '
            cat <<'"'"'NODE'"'"' > /tmp/stackray-smoke-server.mjs
          import http from "node:http";

          const favicon = Buffer.from(
            "AAABAAEAEBAAAAAAIABoBAAAFgAAACgAAAAQAAAAIAAAAAEAIAAAAAAAQAQAAMMOAADDDgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA",
            "base64",
          );
          const html = `<!doctype html>
          <html>
            <head>
              <title>Stackray scanner smoke</title>
              <link rel="icon" href="/favicon.ico">
            </head>
            <body>
              <script src="https://js.stripe.com/v3"></script>
              <script>window.stripePublicKey = "pk_test_stackrayscanner123";</script>
            </body>
          </html>`;

          const server = http.createServer((request, response) => {
            if (request.url === "/favicon.ico") {
              response.writeHead(200, { "content-type": "image/x-icon", server: "Apache" });
              response.end(favicon);
              return;
            }

            response.writeHead(200, { "content-type": "text/html", server: "Apache" });
            response.end(html);
          });

          server.listen(48765, "127.0.0.1");
          NODE

            node /tmp/stackray-smoke-server.mjs &
            server_pid="$!"
            trap "kill ${server_pid}" EXIT

            subfinder -version

            for attempt in 1 2 3 4 5; do
              if node -e "fetch('"'"'http://127.0.0.1:48765'"'"').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"; then
                break
              fi
              sleep 1
            done

            httpx \
              -silent \
              -json \
              -td \
              -title \
              -favicon \
              -cpe \
              -cff /app/lib/server/scans/custom-wappalyzer-fingerprints.json \
              -u http://127.0.0.1:48765 \
              -retries 0 \
              -timeout 5 \
              -duc > /tmp/httpx-smoke.jsonl

            node <<'"'"'NODE'"'"'
          const { readFileSync } = await import("node:fs");

          const rows = readFileSync("/tmp/httpx-smoke.jsonl", "utf8")
            .trim()
            .split("\n")
            .filter(Boolean)
            .map((line) => JSON.parse(line));

          if (rows.length !== 1) {
            throw new Error(`Expected one httpx JSONL row, got ${rows.length}`);
          }

          const [row] = rows;
          if (row.url !== "http://127.0.0.1:48765") {
            throw new Error(`Expected canonical url, got ${row.url}`);
          }
          if (row.status_code !== 200) {
            throw new Error(`Expected status_code 200, got ${row.status_code}`);
          }
          if (row.title !== "Stackray scanner smoke") {
            throw new Error(`Expected page title, got ${row.title}`);
          }
          if (!Array.isArray(row.tech) || !row.tech.includes("Stripe")) {
            throw new Error(`Expected detected Stripe technology, got ${JSON.stringify(row.tech)}`);
          }
          if (!row.tech.includes("Apache HTTP Server")) {
            throw new Error(`Expected detected Apache technology, got ${JSON.stringify(row.tech)}`);
          }
          if (typeof row.favicon !== "string" || row.favicon.length === 0) {
            throw new Error(`Expected favicon hash string, got ${row.favicon}`);
          }
          if (typeof row.favicon_md5 !== "string" || row.favicon_md5.length === 0) {
            throw new Error(`Expected favicon_md5 string, got ${row.favicon_md5}`);
          }
          if (row.favicon_url !== "http://127.0.0.1:48765/favicon.ico") {
            throw new Error(`Expected favicon_url, got ${row.favicon_url}`);
          }
          if ("cpe" in row && !Array.isArray(row.cpe)) {
            throw new Error(`Expected cpe to be an array when present, got ${JSON.stringify(row.cpe)}`);
          }
          if ("TechnologyDetails" in row || "technology_details" in row) {
            throw new Error("Internal technology details leaked into Stackray JSONL output");
          }
          NODE
          '

      - name: Skip worker scanner image build
        if: steps.changes.outputs.changed != 'true'
        run: echo "No scanner-impacting files changed."
