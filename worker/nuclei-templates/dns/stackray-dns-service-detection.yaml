id: stackray-dns-service-detection

info:
  name: Stackray DNS Service Detection
  author: CarlosCommits
  severity: info
  description: |
    Detects high-confidence DNS service ownership and verification records that
    are useful for Stackray technology enrichment but are not covered by the
    upstream nuclei DNS service templates.
  reference:
    - https://docs.aws.amazon.com/ses/latest/dg/creating-identities.html
    - https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/Welcome.html
    - https://learn.microsoft.com/azure/dns/dns-overview
    - https://support.zoom.com/
    - https://cursor.com/
  metadata:
    verified: true
    max-request: 2
  tags: dns,service,txt,ns,stackray

dns:
  - name: "{{FQDN}}"
    type: TXT
    matchers-condition: or

    matchers:
      - type: word
        name: "Amazon SES"
        part: answer
        words:
          - "amazonses:"
          - "include:amazonses.com"

      - type: word
        name: "Zoom"
        part: answer
        words:
          - "ZOOM_verify_"
          - "zoom-domain-verification="

      - type: regex
        name: "Cursor"
        part: answer
        regex:
          - 'cursor-domain-verification-[a-z0-9_-]+=[A-Za-z0-9_-]+'

    extractors:
      - type: regex
        part: answer
        group: 1
        regex:
          - '(?i)((?:amazonses:|[^"\n]*include:amazonses\.com\b)[^"\n]*)'

      - type: regex
        part: answer
        group: 1
        regex:
          - '(?i)((?:ZOOM_verify_[A-Za-z0-9_-]+|zoom-domain-verification=)[^"\n]*)'

      - type: regex
        part: answer
        group: 1
        regex:
          - '(cursor-domain-verification-[a-z0-9_-]+=[A-Za-z0-9_-]+)'

  - name: "{{FQDN}}"
    type: NS
    matchers-condition: or

    matchers:
      - type: regex
        name: "Amazon Route 53"
        part: answer
        regex:
          - '(?i)\bns-\d+\.awsdns-\d+\.(?:com|net|org|co\.uk)\.?'

      - type: regex
        name: "Microsoft Azure DNS"
        part: answer
        regex:
          - '(?i)\bns[1-4]-\d+\.azure-dns\.(?:com|net|org|info)\.?'

    extractors:
      - type: regex
        part: answer
        group: 1
        regex:
          - '(?i)\b(ns-\d+\.awsdns-\d+\.(?:com|net|org|co\.uk)\.?)'

      - type: regex
        part: answer
        group: 1
        regex:
          - '(?i)\b(ns[1-4]-\d+\.azure-dns\.(?:com|net|org|info)\.?)'
