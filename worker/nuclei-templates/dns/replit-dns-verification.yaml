id: replit-dns-verification

info:
  name: Replit DNS Verification
  author: CarlosCommits
  severity: info
  description: |
    Detects Replit domain verification TXT records.
  reference:
    - https://replit.com/
  metadata:
    verified: true
    max-request: 1
  tags: dns,txt,replit,paas,tech

dns:
  - name: "{{FQDN}}"
    type: TXT

    matchers:
      - type: regex
        name: Replit
        part: answer
        regex:
          - 'IN\s+TXT\s+"?replit-verify=[a-f0-9-]+"?'

    extractors:
      - type: regex
        part: answer
        group: 1
        regex:
          - 'IN\s+TXT\s+"?(replit-verify=[a-f0-9-]+)"?'
